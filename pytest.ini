[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    integration: tests that exercise multiple modules together
    browser: tests that require a live Chromium (skipped by default)
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning:playwright.*
    ignore::pytest.PytestUnraisableExceptionWarning
